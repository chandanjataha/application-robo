# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Deployment Specification – Robot Sensor Monitor
#
# Includes:
#   Namespace | ConfigMap | Secret | Deployment | Service | Ingress (TLS)
#   HorizontalPodAutoscaler | NetworkPolicy | ServiceAccount
#
# Apply with:  kubectl apply -f k8s/deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Namespace
metadata:
  name: robotics
  labels:
    app.kubernetes.io/managed-by: kubectl
    team: robotics

---
# ── ServiceAccount (least-privilege) ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: robot-sensor-monitor
  namespace: robotics
  labels:
    app: robot-sensor-monitor
automountServiceAccountToken: false     # don't mount unless needed

---
# ── ConfigMap – non-secret config ────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: robot-sensor-monitor-config
  namespace: robotics
data:
  PORT: "8080"
  LOG_LEVEL: "INFO"

---
# ── Secret – example (TLS cert referenced by Ingress) ────────────────────────
# In production: use cert-manager to auto-provision Let's Encrypt certificates.
# kubectl create secret tls robot-tls \
#   --cert=path/to/tls.crt --key=path/to/tls.key -n robotics
#
# Placeholder shown here for structure clarity:
apiVersion: v1
kind: Secret
metadata:
  name: robot-tls
  namespace: robotics
type: kubernetes.io/tls
data:
  # Replace with real base64-encoded cert/key (generated by cert-manager in prod)
  tls.crt: <BASE64_CERT>
  tls.key: <BASE64_KEY>

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-sensor-monitor
  namespace: robotics
  labels:
    app: robot-sensor-monitor
    version: "1.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: robot-sensor-monitor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0             # zero-downtime rollout

  template:
    metadata:
      labels:
        app: robot-sensor-monitor
        version: "1.0"
      annotations:
        # Prometheus auto-scrape annotations
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8080"

    spec:
      serviceAccountName: robot-sensor-monitor

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: robot-sensor-monitor

      containers:
        - name: robot-sensor-monitor
          image: ghcr.io/YOUR_ORG/robot-sensor-monitor:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: robot-sensor-monitor-config

          # ── Probes ──────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 10
            periodSeconds: 3

          # ── Resource limits ─────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"

          # ── Security context ────────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            runAsUser:                1000
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp            # writable scratch space for read-only FS

      volumes:
        - name: tmp
          emptyDir: {}

      # Restart policy (default for Deployment)
      restartPolicy: Always

      # Don't pull on every start if image unchanged
      terminationGracePeriodSeconds: 30

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: robot-sensor-monitor
  namespace: robotics
  labels:
    app: robot-sensor-monitor
spec:
  selector:
    app: robot-sensor-monitor
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP

---
# ── Ingress with TLS (cert-manager / nginx-ingress) ──────────────────────────
# Exposes the service at https://robot.your-domain.com
# cert-manager will auto-provision a Let's Encrypt certificate.
#
# Prerequisites:
#   helm install cert-manager jetstack/cert-manager --set installCRDs=true
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: robot-sensor-monitor
  namespace: robotics
  annotations:
    kubernetes.io/ingress.class:                "nginx"
    # cert-manager: auto-issue Let's Encrypt TLS certificate
    cert-manager.io/cluster-issuer:             "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect:   "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: no-referrer";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
spec:
  tls:
    - hosts:
        - robot.your-domain.com
      secretName: robot-tls              # cert-manager writes the cert here
  rules:
    - host: robot.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: robot-sensor-monitor
                port:
                  name: http

---
# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: robot-sensor-monitor
  namespace: robotics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: robot-sensor-monitor
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── NetworkPolicy – default deny + allow only needed traffic ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: robot-sensor-monitor
  namespace: robotics
spec:
  podSelector:
    matchLabels:
      app: robot-sensor-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from nginx-ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
