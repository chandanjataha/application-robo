# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline – Robot Sensor Monitor (ROS2 Jazzy DevOps Assignment)
#
# Triggers  : every push + pull-request to main / develop
# Steps     : lint → test (with coverage) → build Docker → push to GHCR → deploy spec
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/robot-sensor-monitor

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 – Lint & static analysis
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 app/main.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --statistics

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 – Unit + Integration Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest app/tests/ -v \
            --tb=short \
            --junitxml=test-results/junit.xml \
            --cov=app \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      # Publish test results in the GitHub Actions UI
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit.xml

      # Upload coverage XML as artifact (usable by Codecov / SonarCloud)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: test-results/coverage.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 – Build & Push Docker Image
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on main branch commits (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag:    ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      # Build metadata: tags + labels derived from git context
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name
            type=ref,event=branch
            # Short SHA  e.g.  sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # SemVer tags when you push a v* git tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always tag latest on main
            type=raw,value=latest,enable={{is_default_branch}}

      # Enable QEMU for multi-arch builds (arm64 for real robots)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push (multi-arch: amd64 + arm64)
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Save the image digest as artifact for audit trail
      - name: Save image digest
        run: echo "${{ steps.build.outputs.digest }}" > image-digest.txt

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 – Security scan (Trivy)
  # ──────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      security-events: write   # needed to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"        # fail pipeline on CRITICAL/HIGH vulns

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 – Notify on failure
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build-and-push, security-scan]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ CI/CD pipeline failed on `${{ github.ref_name }}` by @${{ github.actor }}",
              "attachments": [{
                "color": "#ff0000",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Commit",     "value": "${{ github.sha }}",        "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
