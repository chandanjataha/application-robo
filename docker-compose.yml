# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml – Full local monitoring stack
#
# Services:
#   app        → Robot Sensor Monitor (our app)
#   prometheus → Scrapes /metrics from app
#   loki       → Log aggregation
#   promtail   → Ships Docker logs → Loki
#   grafana    → Dashboards (Prometheus + Loki datasources)
#
# Usage:
#   docker compose up --build
#   Open: http://localhost:3000  (Grafana, admin/admin)
#         http://localhost:8080  (App dashboard)
#         http://localhost:9090  (Prometheus)
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: robot-sensor-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    networks:
      - monitoring
    labels:
      # Promtail will pick up logs from containers with these labels
      logging: "promtail"
      logging_jobname: "robot-sensor-monitor"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"           # allow hot-reload via POST /-/reload
    networks:
      - monitoring

  # ── Loki (log aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # ── Promtail (log shipper) ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - monitoring
    depends_on:
      - loki

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      # Auto-configure datasources
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
